# train
training:
  lr: 3e-5
  epochs: 5

leomix:
  LeoMix:
    mode: [train]
    debug_size: 100
    mix:
      qacot:
        scannet: [gqa3d]
    ratio: 1.0
    dataset_wrapper: LeoObjPadDatasetWrapper2
    dataset_wrapper_args: ${dataset_wrapper_args}
    train_dataloader_args: ${dataloader.train}
    eval_dataloader_args: ${dataloader.eval}

# eval
task_metrics_weights:
  qacot: 1.0

qacot:

  QACOTScanNetGQA3D:
    mode: [val, test]
    dataset_wrapper: LeoObjPadDatasetWrapper2
    dataset_wrapper_args: ${dataset_wrapper_args}
    eval_dataloader_args: ${dataloader.eval}
    evaluator: GQA3DCOTEvaluator